rules:
  - id: CONS_001
    name: "[일관성] 앞뒤 공백 포함 검사"
    description: "데이터 앞뒤에 불필요한 공백이 포함되어 일관성을 해치는지 확인합니다."
    query_template: >
      SELECT '{col}' AS column_name,
             COUNT(*) AS total_cnt,
             SUM(CASE WHEN {CAST_TEXT} LIKE ' %' OR {CAST_TEXT} LIKE '% ' THEN 1 ELSE 0 END) AS error_cnt
      FROM {table}
    detail_query: >
      SELECT {col} FROM {table} WHERE {CAST_TEXT} LIKE ' %' OR {CAST_TEXT} LIKE '% '